<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="StreamSpace is a premium platform for uploading, sharing, and viewing high-quality videos and photos. Connect via StreamSpace Meet.">
  <meta name="google-site-verification" content="8tpgs8FN-1cFk3-kdf2IiqyRh-5VzhqmZrIoL3C1p-Y" />
  <meta name="keywords" content="StreamSpace, stream space, video sharing, photo sharing, live video call, premium videos">
  <meta name="robots" content="index, follow">
  <meta property="og:title" content="StreamSpace | Premium Video & Photo Platform">
  <meta property="og:description" content="StreamSpace is a premium platform for uploading, sharing, and viewing high-quality videos and photos.">
  <meta property="og:url" content="https://stream-space-one.vercel.app/">
  <meta property="og:type" content="website">
  <title>StreamSpace | Premium Video & Photo Platform</title>
  <link rel="stylesheet" href="styles.css?v=4">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div id="debug-error" style="background: red; color: white; padding: 10px; display: none; white-space: pre-wrap; font-size: 14px;"></div>
  <script>
    window.onerror = function(msg, url, line, col, error) {
      const dbg = document.getElementById('debug-error');
      dbg.style.display = 'block';
      dbg.innerText += `\nError: ${msg}\nLine: ${line}, Col: ${col}\n${error?.stack || ''}`;
      return false;
    };
    window.addEventListener('unhandledrejection', function(event) {
      const dbg = document.getElementById('debug-error');
      dbg.style.display = 'block';
      dbg.innerText += `\nUnhandled Promise Rejection: ${event.reason?.message || event.reason}\n${event.reason?.stack || ''}`;
    });
  </script>
  <header>
    <h1><i class="fa-solid fa-film"></i> StreamSpace</h1>
    <nav>
      <a href="meet.html"><i class="fa-solid fa-video"></i> Meet</a>
      <a href="admin.html"><i class="fa-solid fa-lock"></i> Admin Portal</a>
    </nav>
  </header>
  <main>
    <div style="display: flex; gap: 15px; margin-bottom: 20px;">
      <button id="tab-videos" class="btn">Videos</button>
      <button id="tab-photos" class="btn" style="background: rgba(0,0,0,0.4);">Photos</button>
    </div>
    <div id="videos">
      <!-- Videos will be injected here via viewer.js -->
    </div>
    <div id="photos" style="display: none;">
      <!-- Photos will be injected here via viewer.js -->
    </div>
  </main>
  <script type="module" src="scripts/viewer.js?v=12"></script>
</body>
</html>
