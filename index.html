<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="StreamSpace is a premium video uploading and viewing platform with seamless integration and high performance.">
  <title>Video Uploader | Viewer</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div id="debug-error" style="background: red; color: white; padding: 10px; display: none; white-space: pre-wrap; font-size: 14px;"></div>
  <script>
    window.onerror = function(msg, url, line, col, error) {
      const dbg = document.getElementById('debug-error');
      dbg.style.display = 'block';
      dbg.innerText += `\nError: ${msg}\nLine: ${line}, Col: ${col}\n${error?.stack || ''}`;
      return false;
    };
    window.addEventListener('unhandledrejection', function(event) {
      const dbg = document.getElementById('debug-error');
      dbg.style.display = 'block';
      dbg.innerText += `\nUnhandled Promise Rejection: ${event.reason?.message || event.reason}\n${event.reason?.stack || ''}`;
    });
  </script>
  <header>
    <h1><i class="fa-solid fa-film"></i> StreamSpace</h1>
    <nav><a href="admin.html"><i class="fa-solid fa-lock"></i> Admin Portal</a></nav>
  </header>
  <main>
    <section id="videos">
      <!-- Videos will be injected here via viewer.js -->
    </section>
  </main>
  <script type="module" src="scripts/viewer.js"></script>
</body>
</html>
